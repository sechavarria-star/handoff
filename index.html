<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIWA Handoff — Panel de atención humana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #eeece8;
      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-tertiary: #999994;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-dark: #0C447C;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --green-border: #C0DD97;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); height: 100vh; overflow: hidden; }
    .app { display: grid; grid-template-columns: 300px 1fr 300px; grid-template-rows: 56px 1fr; height: 100vh; background: var(--bg-primary); }

    /* TOPBAR */
    .topbar { grid-column: 1 / -1; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--bg-primary); gap: 14px; }
    .topbar-logo { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
    .topbar-logo span { color: var(--blue); }
    .topbar-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
    .topbar-divider { flex: 1; }
    .topbar-nav { display: flex; gap: 4px; }
    .topbar-nav a { font-size: 13px; padding: 5px 13px; border-radius: var(--radius-md); color: var(--text-secondary); cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .topbar-nav a:hover { background: var(--bg-secondary); }
    .topbar-nav a.active { color: var(--blue); font-weight: 500; }
    .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: #B5D4F4; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--blue-dark); flex-shrink: 0; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; position: relative; flex-shrink: 0; }
    .pulse::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 2px solid #1D9E75; opacity: 0; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2); opacity: 0; } }
    .sync-label { font-size: 11px; color: var(--text-tertiary); }

    /* SIDEBAR */
    .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); }
    .sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 12px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sidebar-search input { width: 100%; font-size: 13px; padding: 8px 11px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.15s; }
    .sidebar-search input:focus { border-color: var(--blue); }
    .sidebar-search input::placeholder { color: var(--text-tertiary); }
    .ticket-list { overflow-y: auto; flex: 1; }
    .ticket-item { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; position: relative; }
    .ticket-item:hover { background: var(--bg-secondary); }
    .ticket-item.active { background: var(--blue-light); }
    .ticket-item.active .ticket-name { color: var(--blue); }
    .ticket-info { flex: 1; min-width: 0; }
    .ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .ticket-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-time { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; margin-left: 6px; }
    .ticket-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; position: absolute; bottom: 13px; left: 39px; border: 2px solid var(--bg-primary); }
    .status-dot.active { background: #1D9E75; }
    .status-dot.closed { background: #aaa; }
    .ticket-item.active .status-dot { border-color: var(--blue-light); }

    /* CHAT */
    .chat-area { display: flex; flex-direction: column; overflow: hidden; background: var(--bg-secondary); }
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 13px 18px; background: var(--bg-primary); border-bottom: 1px solid var(--border); }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 14px; font-weight: 500; }
    .chat-header-status { font-size: 12px; color: #1D9E75; margin-top: 1px; }
    .chat-header-id { font-size: 11px; color: var(--text-tertiary); font-family: 'DM Mono', monospace; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 76%; }
    .msg.from-user { align-self: flex-start; }
    .msg.from-agent { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.55; }
    .msg.from-user .msg-bubble { background: var(--bg-primary); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.from-agent .msg-bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .msg-meta { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; padding-bottom: 2px; }
    .msg.from-agent .msg-meta { text-align: right; }
    .system-msg { text-align: center; font-size: 11px; color: var(--text-tertiary); padding: 6px 0; font-family: 'DM Mono', monospace; }
    .chat-input-area { padding: 12px 14px; background: var(--bg-primary); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    .chat-input-area textarea { flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 9px 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); resize: none; height: 40px; line-height: 1.4; outline: none; transition: border 0.15s; }
    .chat-input-area textarea:focus { border-color: var(--blue); }
    .chat-input-area textarea::placeholder { color: var(--text-tertiary); }
    .btn-send { padding: 0 18px; height: 40px; border-radius: var(--radius-md); background: var(--blue); color: #fff; border: none; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
    .btn-send:hover { background: var(--blue-dark); }

    /* RIGHT PANEL */
    .right-panel { border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px; gap: 16px; overflow-y: auto; background: var(--bg-primary); }
    .panel-section { display: flex; flex-direction: column; gap: 8px; }
    .panel-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
    .info-row { display: flex; flex-direction: column; gap: 2px; }
    .info-key { font-size: 11px; color: var(--text-tertiary); }
    .info-val { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .info-val.normal { font-family: 'DM Sans', sans-serif; }
    .status-badge { display: inline-flex; align-items: center; font-size: 12px; padding: 4px 11px; border-radius: var(--radius-md); font-weight: 500; width: fit-content; }
    .status-badge.en-atencion { background: var(--blue-light); color: var(--blue); }
    .status-badge.bot { background: var(--green-light); color: var(--green); }
    .divider { height: 1px; background: var(--border); flex-shrink: 0; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .metric-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; }
    .metric-label { font-size: 11px; color: var(--text-tertiary); }
    .metric-value { font-size: 20px; font-weight: 500; margin-top: 3px; }
    .historial-scroll { font-size: 12px; color: var(--text-secondary); line-height: 1.6; max-height: 130px; overflow-y: auto; }
    .h-rol { color: var(--text-tertiary); font-family: 'DM Mono', monospace; font-size: 11px; }
    .btn-return { width: 100%; padding: 11px; border-radius: var(--radius-md); background: var(--green-light); color: var(--green); border: 1px solid var(--green-border); font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-top: auto; }
    .btn-return:hover { background: var(--green-border); }
    .btn-return:disabled { opacity: 0.45; cursor: not-allowed; }

    /* EMPTY */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 13px; gap: 10px; }
    .empty-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--blue); color: #fff; font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 10px 18px; border-radius: var(--radius-md); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }
  </style>
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="topbar-logo">GIWA <span>Handoff</span></div>
      <div style="font-size:11px;color:var(--text-tertiary);margin-top:1px;">Panel de atención humana</div>
    </div>
    <div class="topbar-divider"></div>
    <div class="pulse"></div>
    <span class="sync-label" id="sync-label">Sincronizando...</span>
    <nav class="topbar-nav">
      <a href="#">Inicio</a>
      <a href="#" class="active">Conversaciones</a>
      <a href="#">Operaciones</a>
    </nav>
    <div class="avatar-sm">SE</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Tickets activos</div>
      <div class="sidebar-search">
        <input type="text" placeholder="Buscar..." id="search-input" oninput="filterTickets(this.value)" />
      </div>
    </div>
    <div class="ticket-list" id="ticket-list"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <span>Seleccioná una conversación</span>
    </div>
    <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <div class="avatar-sm" id="chat-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name">—</div>
          <div class="chat-header-status">En atención</div>
        </div>
        <div class="chat-header-id" id="chat-id-label">chat_id: —</div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <textarea id="msg-input" placeholder="Escribí tu respuesta... (Enter para enviar)" onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="right-panel">
    <div class="empty-state" style="margin-top:40px;">
      <div class="empty-icon">👤</div>
      <span>Sin ticket seleccionado</span>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const N8N_POLLING_URL   = 'https://giwa-ia.app.n8n.cloud/webhook/handoff-tickets';
  const N8N_RESPONDER_URL = 'https://corsproxy.io/?url=https://giwa-ia.app.n8n.cloud/webhook/handoff-responder';
  const N8N_RELEASE_URL = 'https://corsproxy.io/?url=https://giwa-ia.app.n8n.cloud/webhook/handoff-release';
  const POLL_INTERVAL_MS  = 10000;

  const initials = n => n.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const fmt      = ts => new Date(ts).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  const elapsed  = ts => { const m = Math.round((Date.now() - new Date(ts)) / 60000); return m < 60 ? m + ' min' : Math.round(m / 60) + 'h'; };

  let tickets  = [];
  let filtered = [];
  let activeId = null;
  let searchQ  = '';

  // ── POLLING ────────────────────────────────────────────────────────
  async function pollTickets() {
    try {
      const res  = await fetch(N8N_POLLING_URL);
      const data = await res.json();
      const incoming = Array.isArray(data.tickets) ? data.tickets : [];

      // detectar tickets nuevos para notificar
      incoming.forEach(t => {
        const exists = tickets.find(x => x.chat_id === t.chat_id);
        if (!exists && t.estado === 'en_atencion') {
          showToast('Nuevo ticket: ' + t.nombre_usuario);
        }
      });

      // actualizar lista conservando mensajes del agente enviados localmente
      tickets = incoming.map(incoming => {
        const local = tickets.find(x => x.chat_id === incoming.chat_id);
        if (local) {
          // agregar mensajes de agente locales que no están en el servidor aún
          const serverIds = new Set(incoming.historial.map(m => m.timestamp));
          const localAgent = local.historial.filter(m => m.rol === 'agente' && !serverIds.has(m.timestamp));
          incoming.historial = [...incoming.historial, ...localAgent]
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }
        return incoming;
      });

      applyFilter();

      // refrescar vista activa si está abierta
      if (activeId) {
        const t = tickets.find(t => t.chat_id === activeId);
        if (t) {
          renderMessages(t);
          renderRightPanel(t);
        }
      }

      document.getElementById('sync-label').textContent = 'Actualizado ' + fmt(new Date());
    } catch (e) {
      document.getElementById('sync-label').textContent = 'Sin conexión';
    }
  }

  function applyFilter() {
    const q = searchQ.toLowerCase();
    filtered = q
      ? tickets.filter(t => t.nombre_usuario.toLowerCase().includes(q) || t.ultimo_mensaje.toLowerCase().includes(q))
      : [...tickets];
    renderList();
  }

  function filterTickets(q) { searchQ = q; applyFilter(); }

  // ── RENDER LIST ────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('ticket-list');
    list.innerHTML = '';
    if (filtered.length === 0) {
      list.innerHTML = '<div style="padding:24px;text-align:center;font-size:12px;color:#999;">Sin tickets activos</div>';
      return;
    }
    filtered.forEach(t => {
      const el  = document.createElement('div');
      el.className = 'ticket-item' + (t.chat_id === activeId ? ' active' : '');
      el.onclick   = () => selectTicket(t.chat_id);
      const dot    = t.estado === 'en_atencion' ? 'active' : 'closed';
      el.innerHTML = `
        <div class="avatar-sm">${initials(t.nombre_usuario)}</div>
        <div class="status-dot ${dot}"></div>
        <div class="ticket-info">
          <div class="ticket-header">
            <span class="ticket-name">${t.nombre_usuario}</span>
            <span class="ticket-time">${elapsed(t.timestamp_handoff)}</span>
          </div>
          <div class="ticket-preview">${t.ultimo_mensaje}</div>
        </div>`;
      list.appendChild(el);
    });
  }

  // ── SELECT TICKET ──────────────────────────────────────────────────
  function selectTicket(id) {
    activeId = id;
    renderList();
    const t = tickets.find(t => t.chat_id === id);
    if (!t) return;
    document.getElementById('empty-state').style.display  = 'none';
    document.getElementById('chat-active').style.display  = 'flex';
    document.getElementById('chat-avatar').textContent    = initials(t.nombre_usuario);
    document.getElementById('chat-name').textContent      = t.nombre_usuario;
    document.getElementById('chat-id-label').textContent  = 'chat_id: ' + t.chat_id;
    renderMessages(t);
    renderRightPanel(t);
  }

  // ── RENDER MESSAGES ────────────────────────────────────────────────
  function renderMessages(t) {
    const area = document.getElementById('chat-messages');
    const scrollBottom = area.scrollHeight - area.scrollTop === area.clientHeight;
    area.innerHTML = '';
    const sys = document.createElement('div');
    sys.className   = 'system-msg';
    sys.textContent = '— handoff iniciado · ' + fmt(t.timestamp_handoff) + ' —';
    area.appendChild(sys);
    t.historial.forEach(m => {
      const isAgent = m.rol === 'agente';
      const isBot   = m.rol === 'bot';
      const wrap    = document.createElement('div');
      wrap.className = 'msg ' + (isAgent ? 'from-agent' : 'from-user');
      const label   = isAgent ? 'Agente' : isBot ? 'Bot' : t.nombre_usuario;
      const ini     = isAgent ? 'AG' : isBot ? 'B' : initials(t.nombre_usuario);
      const av      = isAgent ? 'background:#B5D4F4;color:#0C447C;'
                    : isBot   ? 'background:#C0DD97;color:#27500A;'
                    :           'background:#F4C0D1;color:#72243E;';
      wrap.innerHTML = `
        <div class="avatar-sm" style="${av}">${ini}</div>
        <div>
          <div class="msg-bubble">${m.mensaje}</div>
          <div class="msg-meta">${label} · ${fmt(m.timestamp)}</div>
        </div>`;
      area.appendChild(wrap);
    });
    if (scrollBottom) area.scrollTop = area.scrollHeight;
  }

  // ── RENDER RIGHT PANEL ─────────────────────────────────────────────
  function renderRightPanel(t) {
    const panel    = document.getElementById('right-panel');
    const isActive = t.estado === 'en_atencion';
    panel.innerHTML = `
      <div class="panel-section">
        <div class="panel-label">Usuario</div>
        <div class="info-row"><span class="info-key">Nombre</span><span class="info-val normal">${t.nombre_usuario}</span></div>
        <div class="info-row"><span class="info-key">Chat ID</span><span class="info-val">${t.chat_id}</span></div>
        <div class="info-row"><span class="info-key">Derivado</span><span class="info-val normal">${fmt(t.timestamp_handoff)}</span></div>
      </div>
      <div class="divider"></div>
      <div class="panel-section">
        <div class="panel-label">Estado</div>
        <span class="status-badge ${isActive ? 'en-atencion' : 'bot'}">${isActive ? 'En atención' : 'Devuelto al bot'}</span>
        <div class="metric-grid">
          <div class="metric-card"><div class="metric-label">Tiempo</div><div class="metric-value">${elapsed(t.timestamp_handoff)}</div></div>
          <div class="metric-card"><div class="metric-label">Mensajes</div><div class="metric-value">${t.historial.length}</div></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="panel-section">
        <div class="panel-label">Historial</div>
        <div class="historial-scroll">
          ${t.historial.map(m => `<div><span class="h-rol">${m.rol}:</span> ${m.mensaje}</div>`).join('')}
        </div>
      </div>
      <div class="divider"></div>
      <button class="btn-return" onclick="returnToBot()" ${!isActive ? 'disabled' : ''}>
        ${isActive ? '↩ Devolver al Bot' : 'Ya devuelto al bot'}
      </button>`;
  }

  // ── SEND MESSAGE ───────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const texto = input.value.trim();
    if (!texto || !activeId) return;
    input.value = '';
    const t = tickets.find(t => t.chat_id === activeId);
    if (!t) return;
    const msg = { rol: 'agente', mensaje: texto, timestamp: new Date().toISOString() };
    t.historial.push(msg);
    t.ultimo_mensaje = texto;
    renderMessages(t);
    renderList();
    fetch(N8N_RESPONDER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: activeId, mensaje: texto, origen: 'agente' })
    }).catch(() => {});
    showToast('Mensaje enviado a Telegram');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ── RETURN TO BOT ──────────────────────────────────────────────────
  function returnToBot() {
    const t = tickets.find(t => t.chat_id === activeId);
    if (!t || t.estado !== 'en_atencion') return;
    fetch(N8N_RELEASE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: activeId, nombre_usuario: t.nombre_usuario })
    }).catch(() => {});
    t.estado = 'cerrado';
    renderRightPanel(t);
    renderList();
    showToast('Conversación devuelta al bot');
  }

  // ── TOAST ──────────────────────────────────────────────────────────
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ── INIT ───────────────────────────────────────────────────────────
  pollTickets();
  setInterval(pollTickets, POLL_INTERVAL_MS);
</script>
</body>
</html>

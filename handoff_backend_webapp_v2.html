
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, .app { font-family: 'DM Sans', sans-serif; background: var(--color-background-tertiary); color: var(--color-text-primary); }
  .app { display: grid; grid-template-columns: 280px 1fr 280px; grid-template-rows: 52px 1fr; height: 620px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
  .topbar { grid-column: 1 / -1; display: flex; align-items: center; padding: 0 20px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); gap: 12px; }
  .topbar-logo { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
  .topbar-logo span { color: #185FA5; }
  .topbar-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
  .topbar-divider { flex: 1; }
  .topbar-nav { display: flex; gap: 4px; }
  .topbar-nav a { font-size: 13px; padding: 5px 12px; border-radius: var(--border-radius-md); color: var(--color-text-secondary); cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .topbar-nav a:hover { background: var(--color-background-secondary); }
  .topbar-nav a.active { color: #185FA5; font-weight: 500; }
  .avatar-sm { width: 30px; height: 30px; border-radius: 50%; background: #B5D4F4; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #0C447C; flex-shrink: 0; }
  .sidebar { border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; overflow: hidden; background: var(--color-background-primary); }
  .sidebar-search { padding: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .sidebar-search input { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); font-family: 'DM Sans', sans-serif; }
  .sidebar-search input::placeholder { color: var(--color-text-tertiary); }
  .ticket-list { overflow-y: auto; flex: 1; }
  .ticket-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; border-bottom: 0.5px solid var(--color-border-tertiary); transition: background 0.12s; position: relative; }
  .ticket-item:hover { background: var(--color-background-secondary); }
  .ticket-item.active { background: #E6F1FB; }
  .ticket-item.active .ticket-name { color: #185FA5; }
  .ticket-info { flex: 1; min-width: 0; }
  .ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .ticket-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ticket-time { font-size: 11px; color: var(--color-text-tertiary); flex-shrink: 0; margin-left: 6px; }
  .ticket-preview { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; bottom: 12px; left: 38px; border: 1.5px solid var(--color-background-primary); }
  .status-dot.active { background: #1D9E75; }
  .status-dot.closed { background: #888780; }
  .chat-area { display: flex; flex-direction: column; overflow: hidden; background: var(--color-background-secondary); }
  .chat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); }
  .chat-header-info { flex: 1; }
  .chat-header-name { font-size: 14px; font-weight: 500; }
  .chat-header-status { font-size: 12px; color: #1D9E75; }
  .chat-header-id { font-size: 11px; color: var(--color-text-tertiary); font-family: 'DM Mono', monospace; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 78%; }
  .msg.from-user { align-self: flex-start; }
  .msg.from-agent { align-self: flex-end; flex-direction: row-reverse; }
  .msg-bubble { padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; }
  .msg.from-user .msg-bubble { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-bottom-left-radius: 4px; color: var(--color-text-primary); }
  .msg.from-agent .msg-bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .msg-meta { font-size: 11px; color: var(--color-text-tertiary); white-space: nowrap; padding-bottom: 2px; }
  .msg.from-agent .msg-meta { text-align: right; }
  .system-msg { text-align: center; font-size: 11px; color: var(--color-text-tertiary); padding: 4px 0; font-family: 'DM Mono', monospace; }
  .chat-input-area { padding: 12px; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); display: flex; gap: 8px; align-items: flex-end; }
  .chat-input-area textarea { flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 9px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); resize: none; height: 38px; line-height: 1.4; }
  .chat-input-area textarea::placeholder { color: var(--color-text-tertiary); }
  .btn-send { padding: 0 16px; height: 38px; border-radius: var(--border-radius-md); background: #185FA5; color: #fff; border: none; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
  .btn-send:hover { background: #0C447C; }
  .right-panel { border-left: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow-y: auto; background: var(--color-background-primary); }
  .panel-section { display: flex; flex-direction: column; gap: 8px; }
  .panel-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
  .info-row { display: flex; flex-direction: column; gap: 2px; }
  .info-key { font-size: 11px; color: var(--color-text-tertiary); }
  .info-val { font-size: 13px; color: var(--color-text-primary); font-weight: 500; font-family: 'DM Mono', monospace; }
  .info-val.normal { font-family: 'DM Sans', sans-serif; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 10px; border-radius: var(--border-radius-md); font-weight: 500; width: fit-content; }
  .status-badge.en-atencion { background: #E6F1FB; color: #185FA5; }
  .status-badge.bot { background: #EAF3DE; color: #3B6D11; }
  .divider { height: 0.5px; background: var(--color-border-tertiary); }
  .btn-return { width: 100%; padding: 11px; border-radius: var(--border-radius-md); background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-return:hover { background: #C0DD97; }
  .btn-return:disabled { opacity: 0.4; cursor: not-allowed; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #185FA5; color: #fff; font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 10px 16px; border-radius: var(--border-radius-md); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--color-text-tertiary); font-size: 13px; gap: 8px; }
  .empty-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; font-size: 16px; }
</style>

<h2 class="sr-only">Panel de handoff — gestión de conversaciones derivadas al agente humano</h2>

<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-logo">GIWA <span>Handoff</span></div>
      <div class="topbar-sub">Panel de atención humana</div>
    </div>
    <div class="topbar-divider"></div>
    <nav class="topbar-nav">
      <a href="#">Inicio</a>
      <a href="#" class="active">Conversaciones</a>
      <a href="#">Operaciones</a>
    </nav>
    <div class="avatar-sm">SE</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" placeholder="Buscar..." id="search-input" oninput="filterTickets(this.value)" />
    </div>
    <div class="ticket-list" id="ticket-list"></div>
  </div>

  <div class="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <span>Seleccioná una conversación</span>
    </div>
    <div id="chat-active" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-header">
        <div class="avatar-sm" id="chat-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name">—</div>
          <div class="chat-header-status">En atención</div>
        </div>
        <div class="chat-header-id" id="chat-id-label">chat_id: —</div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <textarea id="msg-input" placeholder="Escribí tu respuesta..." onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <div class="right-panel" id="right-panel">
    <div class="empty-state" style="margin-top:40px;">
      <div class="empty-icon">👤</div>
      <span>Sin ticket seleccionado</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const N8N_RESPONDER_URL = 'https://giwa-ia.app.n8n.cloud/webhook/handoff-responder';
const N8N_RELEASE_URL   = 'https://giwa-ia.app.n8n.cloud/webhook/handoff-release';

const initials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmt = ts => new Date(ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

let tickets = [
  { chat_id:'123456789', nombre_usuario:'Juan Pérez', ultimo_mensaje:'Necesito hablar con alguien.', timestamp_handoff: new Date(Date.now()-8*60000).toISOString(), estado:'en_atencion', historial:[
    {rol:'usuario',mensaje:'Hola, necesito ayuda con mi pedido.',timestamp:new Date(Date.now()-20*60000).toISOString()},
    {rol:'bot',mensaje:'¡Hola! ¿Cuál es el número de tu pedido?',timestamp:new Date(Date.now()-19*60000).toISOString()},
    {rol:'usuario',mensaje:'El #4872, dice entregado pero no lo recibí.',timestamp:new Date(Date.now()-18*60000).toISOString()},
    {rol:'usuario',mensaje:'Necesito hablar con alguien.',timestamp:new Date(Date.now()-8*60000).toISOString()},
  ]},
  { chat_id:'987654321', nombre_usuario:'María López', ultimo_mensaje:'Quiero hacer un reclamo formal.', timestamp_handoff: new Date(Date.now()-22*60000).toISOString(), estado:'en_atencion', historial:[
    {rol:'usuario',mensaje:'Buenos días, tengo un problema con mi factura.',timestamp:new Date(Date.now()-35*60000).toISOString()},
    {rol:'bot',mensaje:'¡Buenos días! ¿Me podés dar más detalles?',timestamp:new Date(Date.now()-34*60000).toISOString()},
    {rol:'usuario',mensaje:'Quiero hacer un reclamo formal.',timestamp:new Date(Date.now()-22*60000).toISOString()},
  ]},
  { chat_id:'555000111', nombre_usuario:'Carlos Ruiz', ultimo_mensaje:'Ok gracias.', timestamp_handoff: new Date(Date.now()-55*60000).toISOString(), estado:'cerrado', historial:[
    {rol:'usuario',mensaje:'Necesito soporte técnico avanzado.',timestamp:new Date(Date.now()-70*60000).toISOString()},
    {rol:'agente',mensaje:'Hola Carlos, ¿en qué te ayudo?',timestamp:new Date(Date.now()-58*60000).toISOString()},
    {rol:'usuario',mensaje:'Ok gracias.',timestamp:new Date(Date.now()-55*60000).toISOString()},
  ]},
];

let activeId = null;
let filtered = [...tickets];

function filterTickets(q) {
  const ql = q.toLowerCase();
  filtered = tickets.filter(t => t.nombre_usuario.toLowerCase().includes(ql) || t.ultimo_mensaje.toLowerCase().includes(ql));
  renderList();
}

function renderList() {
  const list = document.getElementById('ticket-list');
  list.innerHTML = '';
  filtered.forEach(t => {
    const el = document.createElement('div');
    el.className = 'ticket-item' + (t.chat_id === activeId ? ' active' : '');
    el.onclick = () => selectTicket(t.chat_id);
    const elapsed = Math.round((Date.now() - new Date(t.timestamp_handoff)) / 60000);
    const tl = elapsed < 60 ? elapsed + ' min' : Math.round(elapsed/60) + 'h';
    const dot = t.estado === 'en_atencion' ? 'active' : 'closed';
    el.innerHTML = `
      <div class="avatar-sm">${initials(t.nombre_usuario)}</div>
      <div class="status-dot ${dot}"></div>
      <div class="ticket-info">
        <div class="ticket-header">
          <span class="ticket-name">${t.nombre_usuario}</span>
          <span class="ticket-time">${tl}</span>
        </div>
        <div class="ticket-preview">${t.ultimo_mensaje}</div>
      </div>`;
    list.appendChild(el);
  });
}

function selectTicket(id) {
  activeId = id;
  renderList();
  const t = tickets.find(t => t.chat_id === id);
  if (!t) return;
  document.getElementById('empty-state').style.display = 'none';
  const ca = document.getElementById('chat-active');
  ca.style.display = 'flex';
  document.getElementById('chat-avatar').textContent = initials(t.nombre_usuario);
  document.getElementById('chat-name').textContent = t.nombre_usuario;
  document.getElementById('chat-id-label').textContent = 'chat_id: ' + t.chat_id;
  renderMessages(t);
  renderRightPanel(t);
}

function renderMessages(t) {
  const area = document.getElementById('chat-messages');
  area.innerHTML = '';
  const sys = document.createElement('div');
  sys.className = 'system-msg';
  sys.textContent = '— handoff iniciado · ' + fmt(t.timestamp_handoff) + ' —';
  area.appendChild(sys);
  t.historial.forEach(m => {
    const isAgent = m.rol === 'agente';
    const isBot = m.rol === 'bot';
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isAgent ? 'from-agent' : 'from-user');
    const label = isAgent ? 'Agente' : isBot ? 'Bot' : t.nombre_usuario;
    const ini = isAgent ? 'AG' : isBot ? 'B' : initials(t.nombre_usuario);
    const av = isAgent ? 'background:#B5D4F4;color:#0C447C;' : isBot ? 'background:#C0DD97;color:#27500A;' : 'background:#F4C0D1;color:#72243E;';
    wrap.innerHTML = `
      <div class="avatar-sm" style="${av}">${ini}</div>
      <div>
        <div class="msg-bubble">${m.mensaje}</div>
        <div class="msg-meta">${label} · ${fmt(m.timestamp)}</div>
      </div>`;
    area.appendChild(wrap);
  });
  area.scrollTop = area.scrollHeight;
}

function renderRightPanel(t) {
  const panel = document.getElementById('right-panel');
  const isActive = t.estado === 'en_atencion';
  const elapsed = Math.round((Date.now() - new Date(t.timestamp_handoff)) / 60000);
  const tl = elapsed < 60 ? elapsed + ' min' : (elapsed/60).toFixed(1) + 'h';
  panel.innerHTML = `
    <div class="panel-section">
      <div class="panel-label">Usuario</div>
      <div class="info-row"><span class="info-key">Nombre</span><span class="info-val normal">${t.nombre_usuario}</span></div>
      <div class="info-row"><span class="info-key">Chat ID</span><span class="info-val">${t.chat_id}</span></div>
      <div class="info-row"><span class="info-key">Derivado</span><span class="info-val normal">${fmt(t.timestamp_handoff)}</span></div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <div class="panel-label">Estado</div>
      <span class="status-badge ${isActive ? 'en-atencion' : 'bot'}">${isActive ? 'En atención' : 'Devuelto al bot'}</span>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;">
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;">
          <div style="font-size:11px;color:var(--color-text-tertiary);">Tiempo</div>
          <div style="font-size:18px;font-weight:500;margin-top:2px;">${tl}</div>
        </div>
        <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;">
          <div style="font-size:11px;color:var(--color-text-tertiary);">Mensajes</div>
          <div style="font-size:18px;font-weight:500;margin-top:2px;">${t.historial.length}</div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <div class="panel-label">Historial</div>
      <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6;max-height:130px;overflow-y:auto;">
        ${t.historial.map(m=>`<div><span style="color:var(--color-text-tertiary);font-family:'DM Mono',monospace;font-size:11px;">${m.rol}:</span> ${m.mensaje}</div>`).join('')}
      </div>
    </div>
    <div class="divider"></div>
    <button class="btn-return" onclick="returnToBot()" ${!isActive?'disabled':''}>
      ${isActive ? '↩ Devolver al Bot' : 'Ya devuelto al bot'}
    </button>`;
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const texto = input.value.trim();
  if (!texto || !activeId) return;
  input.value = '';
  const t = tickets.find(t => t.chat_id === activeId);
  if (!t) return;
  const msg = {rol:'agente', mensaje:texto, timestamp:new Date().toISOString()};
  t.historial.push(msg);
  t.ultimo_mensaje = texto;
  renderMessages(t);
  renderList();
  fetch(N8N_RESPONDER_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:activeId, mensaje:texto, origen:'agente'})
  }).catch(()=>{});
  showToast('Mensaje enviado a Telegram');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function returnToBot() {
  const t = tickets.find(t => t.chat_id === activeId);
  if (!t || t.estado !== 'en_atencion') return;
  fetch(N8N_RELEASE_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:activeId, nombre_usuario:t.nombre_usuario})
  }).catch(()=>{});
  t.estado = 'cerrado';
  renderRightPanel(t);
  renderList();
  showToast('Conversación devuelta al bot');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}

window.receiveHandoff = function(data) {
  if (tickets.find(t => t.chat_id === data.chat_id)) return;
  tickets.unshift({
    chat_id: data.chat_id,
    nombre_usuario: data.nombre_usuario || 'Usuario',
    ultimo_mensaje: data.ultimo_mensaje || '',
    timestamp_handoff: data.timestamp || new Date().toISOString(),
    estado: 'en_atencion',
    historial: data.historial || []
  });
  renderList();
  showToast('Nuevo ticket: ' + (data.nombre_usuario || data.chat_id));
};

renderList();
</script>
